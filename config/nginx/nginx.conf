# =============================================================================
# nginx.conf — Serveur web Site Entreprise 3b
# IP : 192.168.3.4 | Accessible depuis 3a via le tunnel WireGuard porté par pfSense
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout  65;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen       80;
        server_name  web.lafassonnade.lan 192.168.3.4;

        root   /usr/share/nginx/html;
        index  index.html;

        # Page principale
        location / {
            try_files $uri $uri/ =404;
        }

        # Health check (utile pour les tests de connectivité via pfSense/WireGuard)
        location /health {
            return 200 'OK - Site Entreprise 3b opérationnel\n';
            add_header Content-Type text/plain;
        }

        # Pages d'erreur
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
