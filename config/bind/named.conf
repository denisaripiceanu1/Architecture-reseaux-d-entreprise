// =============================================================================
// Bind9 — named.conf
// Autoritaire pour lafassonnade.lan + reverse 192.168.3.x
// Forwarder : 8.8.8.8 pour les domaines externes
// =============================================================================

options {
    directory "/var/cache/bind";

    // Écoute sur toutes les interfaces
    listen-on { any; };
    listen-on-v6 { none; };

    // Forwarders externes
    forwarders {
        8.8.8.8;
        1.1.1.1;
    };
    forward only;

    // Autorisations de requêtes (LAN + bridge Docker Desktop macOS)
    allow-query     { 192.168.3.0/24; 127.0.0.1; 10.8.0.0/24; 192.168.65.0/24; };
    allow-recursion { 192.168.3.0/24; 127.0.0.1; 10.8.0.0/24; 192.168.65.0/24; };

    dnssec-validation no;
};

// Zone directe — lafassonnade.lan
zone "lafassonnade.lan" {
    type master;
    file "/etc/bind/zones/db.lafassonnade.lan";
    allow-update { none; };
};

// Zone inverse — 3.168.192.in-addr.arpa
zone "3.168.192.in-addr.arpa" {
    type master;
    file "/etc/bind/zones/db.192.168.3";
    allow-update { none; };
};
