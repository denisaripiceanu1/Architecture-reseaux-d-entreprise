[global]
type=global
user_agent=Entreprise3-Asterisk-PJSIP

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Si les softphones passent par l'IP publiee du serveur Docker et que l'audio
; ne passe pas, renseigner ces valeurs avec l'IP reelle du serveur.
;external_signaling_address=IP_SERVEUR_DOCKER
;external_media_address=IP_SERVEUR_DOCKER
;local_net=192.168.30.0/24

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

[endpoint-template](!)
type=endpoint
context=internal
disallow=all
allow=ulaw,alaw
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
dtmf_mode=rfc4733

[100](endpoint-template)
auth=auth100
aors=aor100
callerid=Poste 100 <100>

[auth100]
type=auth
auth_type=userpass
username=100
password=100100

[aor100]
type=aor
max_contacts=1
remove_existing=yes

[200](endpoint-template)
auth=auth200
aors=aor200
callerid=Poste 200 <200>

[auth200]
type=auth
auth_type=userpass
username=200
password=200200

[aor200]
type=aor
max_contacts=1
remove_existing=yes
