# ISC DHCP — configuration segmentée services / voix / DMZ
#
# Le conteneur DHCP est placé dans services_net (192.168.3.0/24).
# Pour servir voice_net et dmz_net dans une architecture pfSense réaliste,
# activer DHCP Relay sur les interfaces pfSense VOICE et DMZ vers 192.168.3.2.

authoritative;

default-lease-time 3600;
max-lease-time 7200;

option domain-name "lafassonnade.lan";
option domain-search "lafassonnade.lan";
option domain-name-servers 192.168.3.1;

# ---------------------------------------------------------------------------
# SERVICES — 192.168.3.0/24
# Passerelle pfSense : 192.168.3.254
# ---------------------------------------------------------------------------
subnet 192.168.3.0 netmask 255.255.255.0 {
  range 192.168.3.100 192.168.3.200;
  option routers 192.168.3.254;
  option broadcast-address 192.168.3.255;
  option subnet-mask 255.255.255.0;
}

# ---------------------------------------------------------------------------
# VOIX — 192.168.30.0/24
# Passerelle pfSense : 192.168.30.254
# ---------------------------------------------------------------------------
subnet 192.168.30.0 netmask 255.255.255.0 {
  range 192.168.30.100 192.168.30.200;
  option routers 192.168.30.254;
  option broadcast-address 192.168.30.255;
  option subnet-mask 255.255.255.0;
  option domain-name-servers 192.168.3.1;
}

# ---------------------------------------------------------------------------
# DMZ — 192.168.40.0/24
# Passerelle pfSense : 192.168.40.254
# Garder les serveurs DMZ en IP fixe lorsque c'est possible.
# ---------------------------------------------------------------------------
subnet 192.168.40.0 netmask 255.255.255.0 {
  range 192.168.40.100 192.168.40.150;
  option routers 192.168.40.254;
  option broadcast-address 192.168.40.255;
  option subnet-mask 255.255.255.0;
  option domain-name-servers 192.168.3.1;
}

# ---------------------------------------------------------------------------
# Réservations / documentation des IP fixes
# Les conteneurs ci-dessous sont configurés en IP statique dans Compose.
# ---------------------------------------------------------------------------
# services_net
# 192.168.3.1   dns.lafassonnade.lan
# 192.168.3.2   dhcp.lafassonnade.lan
# 192.168.3.5   ldap.lafassonnade.lan
# 192.168.3.6   ldapadmin.lafassonnade.lan
# 192.168.3.10  vpn.lafassonnade.lan
# 192.168.3.15  vault.lafassonnade.lan
# 192.168.3.20  portainer.lafassonnade.lan
#
# voice_net
# 192.168.30.3  voip.lafassonnade.lan
#
# dmz_net
# 192.168.40.4  web.lafassonnade.lan
