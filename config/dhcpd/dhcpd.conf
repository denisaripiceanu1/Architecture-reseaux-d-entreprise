# =============================================================================
# dhcpd.conf — ISC DHCP Server
# Site Entreprise 3a | 192.168.3.0/24
# =============================================================================

# Paramètres globaux
authoritative;                          # Ce serveur fait autorité sur le subnet
default-lease-time 43200;              # Bail par défaut : 12h (en secondes)
max-lease-time 86400;                  # Bail maximum : 24h
min-lease-time 3600;                   # Bail minimum : 1h

# Serveur DNS utilisé pour les mises à jour dynamiques (DDNS)
# Désactivé ici, Bind9 gère les enregistrements statiquement
ddns-update-style none;

# Options globales poussées à tous les clients
option domain-name "lafassonnade.lan";
option domain-name-servers 192.168.3.1;        # DNS Bind9
option ntp-servers 192.168.3.5;                # NTP via Samba AD

# Log
log-facility local7;

# =============================================================================
# Déclaration du sous-réseau 192.168.3.0/24
# =============================================================================
subnet 192.168.3.0 netmask 255.255.255.0 {

    # Plage dynamique pour les clients
    range 192.168.3.100 192.168.3.200;

    # Options spécifiques au subnet
    option routers 192.168.3.254;              # Gateway = R_ent3a
    option subnet-mask 255.255.255.0;
    option broadcast-address 192.168.3.255;

    # Serveur WINS (optionnel, utile avec Samba AD)
    option netbios-name-servers 192.168.3.5;
    option netbios-node-type 8;                # Hybrid mode
}

# =============================================================================
# Baux statiques — machines fixes hors plage dynamique
# (ajouter MAC address selon le parc machine)
# =============================================================================

# Serveur DNS
host dns {
    hardware ethernet AA:BB:CC:DD:EE:01;       # ← remplacer par la vraie MAC
    fixed-address 192.168.3.1;
    option host-name "dns";
}

# Serveur DHCP lui-même
host dhcp {
    hardware ethernet AA:BB:CC:DD:EE:02;
    fixed-address 192.168.3.2;
    option host-name "dhcp";
}

# Serveur VoIP Asterisk
host voip {
    hardware ethernet AA:BB:CC:DD:EE:03;
    fixed-address 192.168.3.3;
    option host-name "voip";
}

# Serveur Web (site 3b — accessible via WireGuard sur pfSense)
host web {
    hardware ethernet AA:BB:CC:DD:EE:04;
    fixed-address 192.168.3.4;
    option host-name "web";
}

# Active Directory Samba
host ad {
    hardware ethernet AA:BB:CC:DD:EE:05;
    fixed-address 192.168.3.5;
    option host-name "ad";
}

# OpenVPN Gateway
host vpn {
    hardware ethernet AA:BB:CC:DD:EE:10;
    fixed-address 192.168.3.10;
    option host-name "vpn";
}

# Portainer
host portainer {
    hardware ethernet AA:BB:CC:DD:EE:20;
    fixed-address 192.168.3.20;
    option host-name "portainer";
}
