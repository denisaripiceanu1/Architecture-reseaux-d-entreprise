; =============================================================================
; extensions.conf — Plan de numérotation Asterisk
; Entreprise 3a | lafassonnade.lan
; =============================================================================
; Contextes :
;   [default]    — Appels entrants non authentifiés (accueil)
;   [interne]    — Appels internes entre extensions
;   [conference] — Salle de conférence MeetMe
;   [sortant]    — Appels vers l'extérieur (si trunk SIP configuré)
; =============================================================================

; ---------------------------------------------------------------------------
; Contexte par défaut — accueil / appels entrants non identifiés
; ---------------------------------------------------------------------------
[default]
exten => s,1,Answer()
 same => n,Wait(1)
 same => n,Playback(welcome)                    ; Message d'accueil
 same => n,Goto(interne,100,1)                  ; Renvoie vers le standard
 same => n,Hangup()

; ---------------------------------------------------------------------------
; Contexte interne — appels entre postes
; ---------------------------------------------------------------------------
[interne]

; ---- Standard (1XX) ----
exten => 100,1,Dial(SIP/100,30)
 same => n,VoiceMail(100@default,u)             ; Messagerie si non répondu
 same => n,Hangup()

; ---- Direction (2XX) ----
exten => 200,1,Dial(SIP/200,20)
 same => n,Dial(SIP/201,20)                     ; Cascade vers adjoint
 same => n,VoiceMail(200@default,u)
 same => n,Hangup()

exten => 201,1,Dial(SIP/201,20)
 same => n,VoiceMail(201@default,u)
 same => n,Hangup()

; ---- Technique (3XX) ----
exten => 300,1,Dial(SIP/300,20)
 same => n,VoiceMail(300@default,u)
 same => n,Hangup()

exten => 301,1,Dial(SIP/301,20)
 same => n,VoiceMail(301@default,u)
 same => n,Hangup()

; Groupe technique — sonne les deux postes simultanément
exten => 399,1,Dial(SIP/300&SIP/301,30)
 same => n,VoiceMail(300@default,u)
 same => n,Hangup()

; ---- Administration (4XX) ----
exten => 400,1,Dial(SIP/400,20)
 same => n,VoiceMail(400@default,u)
 same => n,Hangup()

; ---- Particulier VPN (5XX) ----
exten => 500,1,Dial(SIP/500,30)
 same => n,VoiceMail(500@default,u)
 same => n,Hangup()

; ---- Salle de conférence (9XX) ----
exten => 900,1,Goto(conference,900,1)

; ---- Messagerie vocale personnelle ----
; Composer le *+numéro pour écouter sa messagerie (ex: *100)
exten => _*1XX,1,VoiceMailMain(${EXTEN:1}@default)
 same => n,Hangup()

exten => _*2XX,1,VoiceMailMain(${EXTEN:1}@default)
 same => n,Hangup()

exten => _*3XX,1,VoiceMailMain(${EXTEN:1}@default)
 same => n,Hangup()

exten => _*4XX,1,VoiceMailMain(${EXTEN:1}@default)
 same => n,Hangup()

; ---- Numéros invalides ----
exten => i,1,Playback(invalid)
 same => n,Hangup()

exten => t,1,Playback(goodbye)
 same => n,Hangup()

; ---------------------------------------------------------------------------
; Contexte conférence — salle MeetMe (900)
; ---------------------------------------------------------------------------
[conference]
exten => 900,1,Answer()
 same => n,Wait(1)
 same => n,MeetMe(900,dqM)          ; d=dynamic, q=quiet entry, M=MOH en attente
 same => n,Hangup()

; ---------------------------------------------------------------------------
; Contexte sortant — appels externes via trunk SIP
; (À compléter si un trunk opérateur est configuré)
; ---------------------------------------------------------------------------
[sortant]
; Appels nationaux français (0X XX XX XX XX)
exten => _0XXXXXXXXX,1,Dial(SIP/trunk/${EXTEN})
 same => n,Hangup()

; Appels internationaux (00 + indicatif)
exten => _00X.,1,Dial(SIP/trunk/${EXTEN})
 same => n,Hangup()

; Numéros d'urgence — toujours autorisés
exten => 15,1,Dial(SIP/trunk/15)    ; SAMU
exten => 17,1,Dial(SIP/trunk/17)    ; Police
exten => 18,1,Dial(SIP/trunk/18)    ; Pompiers
exten => 112,1,Dial(SIP/trunk/112)  ; Urgences européen
