; =============================================================================
; sip.conf — Configuration SIP Asterisk
; Réseau : 192.168.3.0/24 | Domaine : lafassonnade.lan
; Clients VPN OpenVPN : 10.8.0.0/24
; =============================================================================

[general]
context = default
bindaddr = 0.0.0.0
bindport = 5060
transport = udp,tcp

; Identité du serveur
domain = lafassonnade.lan
realm = lafassonnade.lan
fromdomain = lafassonnade.lan

; Réseau local (pas de NAT pour ces plages)
localnet = 192.168.3.0/255.255.255.0
localnet = 10.8.0.0/255.255.255.0        ; Clients OpenVPN (particuliers)

; Codec audio — priorité qualité/compatibilité
allow = !all                              ; Désactiver tous les codecs
allow = ulaw                              ; G.711 µ-law (bonne qualité)
allow = alaw                              ; G.711 a-law (Europe)
allow = g722                              ; HD Voice
allow = g729                              ; Compression (économie bande passante)

; Sécurité
alwaysauthreject = yes                    ; Rejette sans révéler si l'user existe
maxexpirey = 3600
defaultexpiry = 120
qualify = yes                             ; Ping régulier pour détecter déconnexions
qualifyfreq = 60

; RTP — plage définie dans docker-compose
rtpstart = 10000
rtpend = 10100

; Logs
recordhistory = yes
dumphistory = yes

; =============================================================================
; COMPTES SIP — Utilisateurs internes
; Plan de numérotation :
;   1XX — Standard / Accueil
;   2XX — Direction
;   3XX — Technique
;   4XX — Administration
;   9XX — Conférence / Services spéciaux
; =============================================================================

; --- Standard ---
[100]
type = friend
secret = sip_100_pwd             ; ← changer en production
callerid = "Standard" <100>
context = interne
host = dynamic
nat = no
dtmfmode = rfc2833
disallow = all
allow = ulaw
allow = alaw
allow = g722

