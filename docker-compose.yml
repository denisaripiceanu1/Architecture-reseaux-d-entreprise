# =============================================================================
# Infrastructure Réseau Entreprise 3a / 3b
# Schéma : Site 3a (services) <--WireGuard sur pfSense / AS--> Site 3b (web)
# Réseau LAN : 192.168.3.0/24 | Domaine : lafassonnade.lan
# Note : WireGuard n'est plus lancé comme conteneur Docker ici. Le tunnel
# site-à-site doit être configuré sur les VM pfSense qui représentent les
# routeurs/firewalls R_ent3a et R_ent3b.
# =============================================================================

networks:
  # LAN principal — Site Entreprise 3a
  lan_3a:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.3.0/24
          gateway: 192.168.3.250   # Docker network gateway (moved to free .254)

  # LAN secondaire — Site Entreprise 3b (isolé, relié via WireGuard sur pfSense)
  # LAN secondaire — Site Entreprise 3b
  # Note: using the same `lan_3a` network for both sites in this lab setup
  # lan_3b removed to avoid overlapping IP pools

  # Lien WAN entre R_ent3a (.2) et AS3 (.1)
  # wan_120:
    # driver: bridge
    # ipam:
    #   config:
    #     - subnet: 120.0.48.0/30


# =============================================================================
# SERVICES — SITE ENTREPRISE 3a
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # DNS — Bind9 | 192.168.3.1
  # Autoritaire pour lafassonnade.lan, forwarder vers 8.8.8.8
  # ---------------------------------------------------------------------------
  dns:
    image: internetsystemsconsortium/bind9:9.18
    container_name: dns_e3
    hostname: dns.lafassonnade.lan
    networks:
      lan_3a:
        ipv4_address: 192.168.3.1
    volumes:
      - ./config/bind/named.conf:/etc/bind/named.conf:ro
      - ./config/bind/zones/db.lafassonnade.lan:/etc/bind/zones/db.lafassonnade.lan:ro
      - ./config/bind/zones/db.192.168.3:/etc/bind/zones/db.192.168.3:ro
      - bind_data:/var/cache/bind
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "rndc status | grep -q 'server is up and running'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # DHCP — dhcpd | 192.168.3.2
  # Plage : 192.168.3.100 – 192.168.3.200
  # Pousse : gateway=192.168.3.254, dns=192.168.3.1, domain=lafassonnade.lan
  # ---------------------------------------------------------------------------
  dhcp:
    image: networkboot/dhcpd:latest
    container_name: dhcp_e3
    hostname: dhcp.lafassonnade.lan
    networks:
      lan_3a:
        ipv4_address: 192.168.3.2
    volumes:
      - ./config/dhcpd/dhcpd.conf:/data/dhcpd.conf:ro
      - dhcpd_leases:/data
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    depends_on:
      dns:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # VoIP — Asterisk | 192.168.3.3
  # ---------------------------------------------------------------------------
  asterisk:
    image: andrius/asterisk:22-cert
    container_name: asterisk_voip_e3
    hostname: voip.lafassonnade.lan
    networks:
      lan_3a:
        ipv4_address: 192.168.3.3
    volumes:
      - ./config/asterisk/asterisk.conf:/etc/asterisk/asterisk.conf:ro
      - ./config/asterisk/sip.conf:/etc/asterisk/sip.conf:ro
      - ./config/asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - asterisk_data:/var/lib/asterisk
      - ./vault-credentials/asterisk:/vault/agent:ro
    ports:
      - "5060:5060/udp"   # SIP
      - "5060:5060/tcp"   # SIP TCP
      - "10000-10100:10000-10100/udp"  # RTP media
    restart: unless-stopped
    depends_on:
      - dns

  # ---------------------------------------------------------------------------
  # Annuaire — OpenLDAP | 192.168.3.5
  # Base DN : dc=lafassonnade,dc=lan
  # Interface web : phpLDAPadmin sur http://192.168.3.6:8080
  # ---------------------------------------------------------------------------
  openldap:
    image: osixia/openldap:1.5.0
    platform: linux/amd64
    container_name: openldap
    hostname: ldap.lafassonnade.lan
    networks:
      lan_3a:
        ipv4_address: 192.168.3.5
    environment:
      LDAP_ORGANISATION: "Entreprise 3"
      LDAP_DOMAIN: "lafassonnade.lan"
      LDAP_BASE_DN: "dc=lafassonnade,dc=lan"
      LDAP_ADMIN_PASSWORD_FILE: /run/secrets/ldap-admin-password   # Injecté par Vault Agent
      LDAP_CONFIG_PASSWORD_FILE: /run/secrets/ldap-config-password
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: "readonly"
      LDAP_READONLY_USER_PASSWORD_FILE: /run/secrets/ldap-readonly-password
      LDAP_RFC2307BIS_SCHEMA: "false"
      LDAP_TLS: "false"                 # Désactivé pour le lab (activer en prod)
      LDAP_REPLICATION: "false"
    volumes:
      - ./config/openldap/bootstrap/ldif/01-structure.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/01-structure.ldif:ro
      - ./config/openldap/fix/admin/admin-password-change.ldif:/container/service/slapd/assets/config/admin/admin-password-change.ldif:ro
      - ./config/openldap/fix/replication/replication-disable.ldif:/container/service/slapd/assets/config/replication/replication-disable.ldif:ro
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
      - openldap_secrets:/run/secrets        # Mots de passe rendus par le Vault Agent
    ports:
      - "389:389"     # LDAP
      - "636:636"     # LDAPS (désactivé ici, port réservé)
    restart: unless-stopped
    depends_on:
      dns:
        condition: service_healthy
      vault-agent-openldap:
        condition: service_healthy   # Attend que les secrets soient injectés dans /run/secrets

  # ---------------------------------------------------------------------------
  # Vault Agent (sidecar) — OpenLDAP | 192.168.3.16
  # Lit role-id/secret-id, s'authentifie sur Vault (AppRole) et rend les
  # mots de passe dans le volume partagé openldap_secrets (/run/secrets).
  # ---------------------------------------------------------------------------
  vault-agent-openldap:
    image: hashicorp/vault:1.20
    container_name: vault-agent-openldap
    hostname: vault-agent-ldap.lafassonnade.lan
    user: root                         # Pour écrire le token + les fichiers du volume
    entrypoint: vault                  # Bypass l'entrypoint serveur de l'image
    command: agent -config=/vault/agent/config.hcl
    networks:
      lan_3a:
        ipv4_address: 192.168.3.16
    volumes:
      - ./vault-credentials/openldap:/vault/agent                                   # role-id, secret-id (+ token)
      - ./config/vault/agents/vault-agent-openldap.hcl:/vault/agent/config.hcl:ro
      - ./config/vault/agents/templates:/vault/agent/templates:ro
      - openldap_secrets:/run/secrets                                               # Sortie : fichiers de mots de passe
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully   # Vault descellé + role-id/secret-id écrits
    healthcheck:
      test: ["CMD", "sh", "-c", "test -s /run/secrets/ldap-admin-password"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s

  # ---------------------------------------------------------------------------
  # phpLDAPadmin — Interface web OpenLDAP | 192.168.3.6
  # UI : http://ldapadmin.lafassonnade.lan:8080
  # ---------------------------------------------------------------------------
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin
    hostname: ldapadmin.lafassonnade.lan
    networks:
      lan_3a:
        ipv4_address: 192.168.3.6
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "192.168.3.5"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - openldap

  # ---------------------------------------------------------------------------
  # OpenVPN — accès Particulier | 192.168.3.10
  # Clients reçoivent un accès au réseau 192.168.3.0/24
  # ---------------------------------------------------------------------------
  openvpn:
    image: openvpn/openvpn-as:3.1.0-e22fe316-Ubuntu24
    container_name: openvpn_gateway
    hostname: vpn.lafassonnade.lan
    networks:
      lan_3a:
        ipv4_address: 192.168.3.10
    volumes:
      - openvpn_data:/etc/openvpn
      - ./vault-credentials/openvpn:/vault/agent:ro
    ports:
      - "1194:1194/udp"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    restart: unless-stopped
    environment:
      OVPN_SERVER: 10.8.0.0/24        # Pool VPN pour les particuliers
      OVPN_PUSH: "route 192.168.3.0 255.255.255.0"
    depends_on:
      - dns

  # ---------------------------------------------------------------------------
  # WireGuard (côté 3a) — DESACTIVE DANS DOCKER
  # Le VPN site-à-site doit traverser les AS et être porté par la VM pfSense
  # R_ent3a, pas par un conteneur du LAN applicatif.
  #
  # Exemple d'ancienne maquette Docker conservée pour référence :
  #
  # wireguard_3a:
  #   image: linuxserver/wireguard:latest
  #   container_name: wireguard_rent3a
  #   hostname: rent3a.lafassonnade.lan
  #   networks:
  #     lan_3a:
  #       ipv4_address: 192.168.3.252
  #   volumes:
  #     - ./config/wireguard/3a/wg0.conf:/config/wg0.conf:ro
  #     - wireguard_3a_data:/config
  #   cap_add:
  #     - NET_ADMIN
  #     - SYS_MODULE
  #   sysctls:
  #     - net.ipv4.ip_forward=1
  #     - net.ipv4.conf.all.src_valid_mark=1
  #   environment:
  #     - PUID=1000
  #     - PGID=1000
  #     - TZ=Europe/Paris
  #   ports:
  #     - "51820:51820/udp"
  #   restart: unless-stopped
  #   depends_on:
  #     - dns


# =============================================================================
# SERVICES — SITE ENTREPRISE 3b
# =============================================================================

  # ---------------------------------------------------------------------------
  # Serveur Web — Nginx | 192.168.3.4
  # Accessible depuis 3a via le tunnel WireGuard porté par pfSense
  # ---------------------------------------------------------------------------
  web_3b:
    image: nginx:alpine
    container_name: web_entreprise3b
    hostname: web.lafassonnade.lan
    networks:
      lan_3a:
        ipv4_address: 192.168.3.4
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/html/:/usr/share/nginx/html/:ro
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # WireGuard (côté 3b) — DESACTIVE DANS DOCKER
  # Le peer R_ent3b doit etre configure sur la VM pfSense du site 3b.
  #
  # Exemple d'ancienne maquette Docker conservée pour référence :
  #
  # wireguard_3b:
  #   image: linuxserver/wireguard:latest
  #   container_name: wireguard_rent3b
  #   hostname: rent3b.lafassonnade.lan
  #   networks:
  #     lan_3a:
  #       ipv4_address: 192.168.3.253
  #   volumes:
  #     - ./config/wireguard/3b/wg0.conf:/config/wg0.conf:ro
  #     - wireguard_3b_data:/config
  #   cap_add:
  #     - NET_ADMIN
  #     - SYS_MODULE
  #   sysctls:
  #     - net.ipv4.ip_forward=1
  #     - net.ipv4.conf.all.src_valid_mark=1
  #   environment:
  #     - PUID=1000
  #     - PGID=1000
  #     - TZ=Europe/Paris
  #   restart: unless-stopped
  #   depends_on:
  #     - wireguard_3a


# =============================================================================
# GESTION — Portainer | 192.168.3.20
# Interface web de gestion de tous les conteneurs Docker
# UI : https://portainer.lafassonnade.lan (port 9443)
# =============================================================================

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    hostname: portainer.lafassonnade.lan
    networks:
      lan_3a:
        ipv4_address: 192.168.3.20
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Accès au daemon Docker
      - portainer_data:/data
    ports:
      - "9443:9443"   # HTTPS (UI principale)
      - "9000:9000"   # HTTP (fallback)
      - "8000:8000"   # Edge agent tunnel
    restart: unless-stopped

# =============================================================================
# SECRETS — HashiCorp Vault | 192.168.3.15
# Backend : fichier local (persistant)
# Auth    : AppRole (un role par service)
# UI      : http://vault.lafassonnade.lan:8200
# =============================================================================
 
  vault:
    image: hashicorp/vault:1.20
    container_name: vault
    hostname: vault.lafassonnade.lan
    networks:
      lan_3a:
        ipv4_address: 192.168.3.15
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_API_ADDR: "http://192.168.3.15:8200"
      VAULT_LOCAL_CONFIG: >
        ui = true
        disable_mlock = true
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = true
        }
        storage "file" {
          path = "/vault/data"
        }
        api_addr = "http://192.168.3.15:8200"
    volumes:
      - vault_data:/vault/data
      - ./config/vault/policies:/vault/policies:ro
    privileged: true
    command: vault server -config=/vault/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O- http://127.0.0.1:8200/v1/sys/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Vault Init — bootstrap + unseal idempotent (init container) | 192.168.3.17
  # À CHAQUE démarrage : attend Vault, le descelle avec les clés stockées dans
  # vault-credentials/vault-init.json, puis garantit policies/approles/secrets.
  # Le script vault-init.sh est idempotent : init une seule fois, unseal à chaque
  # boot, secrets applicatifs générés une fois puis réutilisés.
  # Les secrets/fichiers WireGuard peuvent encore être générés par le script
  # comme aide de configuration, mais ils ne sont plus consommés par Docker.
  # ---------------------------------------------------------------------------
  vault-init:
    image: hashicorp/vault:1.20
    container_name: vault-init
    hostname: vault-init.lafassonnade.lan
    networks:
      lan_3a:
        ipv4_address: 192.168.3.17
    environment:
      VAULT_ADDR: "http://vault:8200"     # Joint le serveur Vault par son nom de service
    working_dir: /project
    entrypoint: []
    command: ["sh", "-c", "apk add --no-cache bash wireguard-tools python3 && exec bash config/vault/vault-init.sh"]
    volumes:
      - ./config:/project/config                       # policies, templates, script
      - ./vault-credentials:/project/vault-credentials # clés d'unseal + role-id/secret-id (lus + écrits)
    depends_on:
      vault:
        condition: service_started        # Vault est encore sealed à ce stade → pas service_healthy
    restart: "no"                          # Conteneur "one-shot" : il s'exécute puis sort


# =============================================================================
# VOLUMES PERSISTANTS
# =============================================================================
volumes:
  bind_data:
  dhcpd_leases:
  asterisk_data:
  samba_data:
  samba_config:
  openvpn_data:
  # Volumes WireGuard désactivés : le VPN site-à-site est porté par pfSense.
  # wireguard_3a_data:
  # wireguard_3b_data:
  vault_data:
  portainer_data:
  openldap_data:
  openldap_config:
  openldap_secrets:   # Volume partagé : Vault Agent (écrit) <-> OpenLDAP (lit)
